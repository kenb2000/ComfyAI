<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ComfyAI</title>
    <link rel="stylesheet" href="./styles.css" />
    <script defer src="./app.js"></script>
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <div class="eyebrow">ComfyAI desktop shell</div>
        <h1>Starting ComfyUI</h1>
        <p id="status" class="status">Preparing the local runtime and waiting for the editor to respond.</p>
        <div class="spinner" aria-hidden="true"></div>
        <pre id="details" class="details">Shell boot has started.</pre>
        <button id="retry" class="retry hidden" type="button">Retry launch</button>
      </section>
    </main>
  </body>
</html>
